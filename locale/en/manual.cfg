[assembly-combinator]
menu_assembly-combinator=Assembly combinator
title_assembly-combinator=Assembly combinator
page_assembly-combinator_text_1=The assembly combinator runs a small assembly-like program every tick. Programs read and write registers, wait, and emit circuit signals. Use the Reference section for the instruction set and Registers, and the Tutorial section for guided examples.

menu_reference=Reference
title_reference=Reference
page_reference_text_1=Reference material for the assembly combinator's registers and instruction set.

menu_registers=Registers
title_registers=Registers
page_registers_text_1=x0 is hardwired to zero. Writes are ignored; reads always return 0. Use it as a constant source and as the discard target for instructions whose result you do not need.
page_registers_text_2=x1 through x31 are general-purpose 32-bit signed integer registers. They start at 0 and persist across instructions until the program is edited.
page_registers_text_3=o0 through o3 are output registers. Each holds a signal as { name, count }. Their values are emitted on the connected circuit network while the combinator's output is enabled. WSIG writes to them.

menu_instructions=Instructions
title_instructions=Instructions
page_instructions_text_1=HLT — Halt the program. Subsequent ticks do nothing until the program is edited.
page_instructions_text_2=NOP — No operation. Advances the instruction pointer.
page_instructions_text_3=ADDI rd, rs, imm — rd = rs + imm. imm is a literal integer. Writes to x0 are ignored.
page_instructions_text_4=SUB rd, rs, rt — rd = rs - rt. Writes to x0 are ignored.
page_instructions_text_5=SLT rd, rs, rt — rd = 1 if rs < rt else 0.
page_instructions_text_6=SLTI rd, rs, imm — rd = 1 if rs < imm else 0.
page_instructions_text_7=WAIT n — Pause for n ticks. n may be an immediate integer or a register name (e.g. WAIT x10).
page_instructions_text_8=WSIG od, signal, rs|imm — Set output register od to emit (signal, count). od must be o0..o3. signal is a signal name (e.g. copper-plate). The count may be a register (e.g. x10) or an immediate integer (e.g. 42).
page_instructions_text_9=JAL rd, label — rd = current instruction pointer, then jump to label. Use x0 as rd to discard the return address.
page_instructions_text_10=BEQ rs, rt, label — Jump to label if rs == rt.
page_instructions_text_11=BNE rs, rt, label — Jump to label if rs != rt.
page_instructions_text_12=RSIG rd, signal [, wire] — Read the count of signal from the connected circuit network into register rd. wire is red, green, or both (default). Writes to x0 are ignored.

menu_tutorial=Tutorial
title_tutorial=Tutorial
page_tutorial_text_1=Three short example programs. Type them into a combinator's editor and click Save to run.

menu_hello-signal=Hello signal
title_hello-signal=Hello signal
page_hello-signal_text_1=Emit a fixed signal forever. WSIG writes (signal, count) into an output register; HLT stops the program so it does not keep re-writing the same value.
page_hello-signal_text_2=    ADDI x10, x0, 42\n    WSIG o0, iron-plate, x10\n    HLT

menu_counter=Counter
title_counter=Counter
page_counter_text_1=Increment a register once per second and emit its value as a signal. WAIT 60 pauses 60 ticks (1 second). The loop runs until x10 reaches 100, then JAL restarts main and the counter resets.
page_counter_text_2=main:\n    ADDI x10, x0, 0\nloop:\n    ADDI x10, x10, 1\n    WSIG o1, copper-plate, x10\n    WAIT 60\n    SLTI x6, x10, 100\n    BNE  x6, x0, loop\n    JAL  x1, main

menu_branching=Branching
title_branching=Branching
page_branching_text_1=Branch on a comparison. SLT sets x3 to 1 when x1 < x2, otherwise 0. BEQ jumps to the equal branch when x3 == x0 (i.e. when x1 was not less than x2).
page_branching_text_2=    ADDI x1, x0, 5\n    ADDI x2, x0, 7\n    SLT  x3, x1, x2\n    BEQ  x3, x0, equal\n    WSIG o0, iron-plate, x1\n    HLT\nequal:\n    WSIG o0, copper-plate, x2\n    HLT

